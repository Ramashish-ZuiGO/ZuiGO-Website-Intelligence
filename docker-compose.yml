name: zuigo-website-intelligence

services:
  postgres:
    image: postgres:18.4-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-website_intelligence}
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:8.8-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: ./apps/api
    environment:
      APP_ENV: ${APP_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      POSTGRES_USER: ${POSTGRES_USER:-website_intelligence}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-website_intelligence}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      REDIS_URL: ${REDIS_URL:?Set REDIS_URL in .env}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost:3000}
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: ./apps/worker
    command: celery --app worker_app.celery_app:celery_app worker --loglevel=${LOG_LEVEL:-INFO}
    environment:
      APP_ENV: ${APP_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      REDIS_URL: ${REDIS_URL:?Set REDIS_URL in .env}
      POSTGRES_USER: ${POSTGRES_USER:-website_intelligence}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-website_intelligence}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      AI_PROVIDER: ${AI_PROVIDER:-disabled}
      AI_MODEL: ${AI_MODEL:-not-configured}
      AI_BASE_URL: ${AI_BASE_URL:-http://host.docker.internal:11434}
      AI_TIMEOUT_SECONDS: ${AI_TIMEOUT_SECONDS:-120}
      BROWSER_LAUNCH_TIMEOUT_MS: ${BROWSER_LAUNCH_TIMEOUT_MS:-20000}
      NAVIGATION_TIMEOUT_MS: ${NAVIGATION_TIMEOUT_MS:-45000}
      DOM_READINESS_TIMEOUT_MS: ${DOM_READINESS_TIMEOUT_MS:-15000}
      PAGE_STABILIZATION_MS: ${PAGE_STABILIZATION_MS:-2000}
      EVIDENCE_COLLECTION_TIMEOUT_MS: ${EVIDENCE_COLLECTION_TIMEOUT_MS:-20000}
      LIGHTHOUSE_TIMEOUT_SECONDS: ${LIGHTHOUSE_TIMEOUT_SECONDS:-120}
      ANALYSIS_JOB_TIMEOUT_SECONDS: ${ANALYSIS_JOB_TIMEOUT_SECONDS:-300}
      ANALYSIS_MAX_ATTEMPTS: ${ANALYSIS_MAX_ATTEMPTS:-2}
      ANALYSIS_RETRY_BACKOFF_SECONDS: ${ANALYSIS_RETRY_BACKOFF_SECONDS:-1}
      W3C_VALIDATION_ENABLED: ${W3C_VALIDATION_ENABLED:-true}
      W3C_VALIDATION_ENDPOINT: ${W3C_VALIDATION_ENDPOINT:-https://validator.w3.org/nu/?out=json}
      W3C_TIMEOUT_SECONDS: ${W3C_TIMEOUT_SECONDS:-20}
      POLICY_PAGE_TIMEOUT_SECONDS: ${POLICY_PAGE_TIMEOUT_SECONDS:-15}
      DIAGNOSTIC_MAX_RESOURCES: ${DIAGNOSTIC_MAX_RESOURCES:-20}
      DIAGNOSTIC_EVIDENCE_LIMIT: ${DIAGNOSTIC_EVIDENCE_LIMIT:-20}
      RESPONSIVE_VIEWPORTS: ${RESPONSIVE_VIEWPORTS:-mobile_portrait:390x844,mobile_landscape:844x390,tablet:768x1024,laptop:1366x768,desktop:1920x1080}
      DISCOVERY_MAX_URLS: ${DISCOVERY_MAX_URLS:-500}
      DISCOVERY_MAX_HTML_PAGES: ${DISCOVERY_MAX_HTML_PAGES:-50}
      DISCOVERY_MAX_DEPTH: ${DISCOVERY_MAX_DEPTH:-3}
      DISCOVERY_MAX_LINKS_PER_PAGE: ${DISCOVERY_MAX_LINKS_PER_PAGE:-500}
      DISCOVERY_MAX_SITEMAP_FILES: ${DISCOVERY_MAX_SITEMAP_FILES:-20}
      DISCOVERY_MAX_SITEMAP_DEPTH: ${DISCOVERY_MAX_SITEMAP_DEPTH:-3}
      DISCOVERY_MAX_REDIRECTS: ${DISCOVERY_MAX_REDIRECTS:-5}
      DISCOVERY_REQUEST_TIMEOUT_SECONDS: ${DISCOVERY_REQUEST_TIMEOUT_SECONDS:-15}
      DISCOVERY_DEADLINE_SECONDS: ${DISCOVERY_DEADLINE_SECONDS:-180}
      DISCOVERY_MAX_RESPONSE_BYTES: ${DISCOVERY_MAX_RESPONSE_BYTES:-2000000}
      DISCOVERY_INCLUDE_VERIFIED_SUBDOMAINS: ${DISCOVERY_INCLUDE_VERIFIED_SUBDOMAINS:-false}
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import socket, subprocess, sys; result = subprocess.run(['celery', '--app', 'worker_app.celery_app:celery_app', 'inspect', 'ping', '--destination', f'celery@{socket.gethostname()}', '--timeout', '5'], capture_output=True, text=True, timeout=8); sys.exit(0 if result.returncode == 0 and 'pong' in result.stdout else 1)",
        ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
